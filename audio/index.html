<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio — Your Name</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/gallery.js"></script>
  <script src="../assets/js/home.js"></script>
  <script src="../assets/js/about.js"></script>
  <script src="../assets/js/piece.js"></script>
</head>
<body class="audio">
  <div id="app" data-section="audio">

    <!-- Reactive LED equalizer backdrop -->
    <canvas class="eq-canvas" id="eq-canvas" aria-hidden="true"></canvas>

    <a href="../" class="ipod-home">← home</a>

    <div class="ipod-stage">
      <div class="ipod" id="ipod">
        <div class="ipod-screen-bezel">
          <div class="ipod-screen" id="ipod-screen">
            <!-- Menu / Now-Playing populated by JS -->
          </div>
        </div>

        <div class="ipod-wheel">
          <button class="wheel-label wheel-menu" id="wheel-menu">MENU</button>
          <button class="wheel-label wheel-prev" id="wheel-prev" aria-label="Previous">&#9198;</button>
          <button class="wheel-label wheel-next" id="wheel-next" aria-label="Next">&#9197;</button>
          <button class="wheel-label wheel-play" id="wheel-play" aria-label="Play / Pause">&#9199;</button>
          <button class="wheel-center" id="wheel-center" aria-label="Select"></button>
        </div>
      </div>
    </div>

    <script>initGallery({ section: "audio", contentPath: "../content.json" });</script>
  </div>
</body>
</html>
